<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discussions - IFRI MentorLink</title>
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-sidebar: #1e293b;
            --border-color: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-teal: #2dd4bf;
            --bubble-me: #2dd4bf;
            --bubble-them: #334155;
            --unread-red: #ef4444;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- PANNEAU GAUCHE : LISTE DES DISCUSSIONS --- */
        .sidebar {
            width: 360px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            z-index: 5;
        }

        .sidebar-header {
            padding: 20px 16px 10px 16px;
        }

        .sidebar-title {
            font-size: 24px;
            font-weight: 700;
            margin: 0 0 16px 0;
        }

        .search-box {
            width: 100%;
            background-color: var(--bg-main);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 10px 16px;
            color: var(--text-main);
            font-size: 14px;
            box-sizing: border-box;
            outline: none;
        }

        .search-box:focus {
            border-color: var(--accent-teal);
        }

        .discussion-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px 0;
        }

        .discussion-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            cursor: pointer;
            transition: background 0.2s;
            gap: 12px;
        }

        .discussion-item:hover, .discussion-item.active {
            background-color: rgba(255, 255, 255, 0.05);
        }

        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background-color: var(--border-color);
            color: var(--accent-teal);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
            flex-shrink: 0;
            border: 2px solid transparent;
        }

        .discussion-item.active .avatar {
            border-color: var(--accent-teal);
        }

        .item-body {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .item-name-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .user-name {
            font-weight: 600;
            font-size: 15px;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .unread-dot {
            width: 8px;
            height: 8px;
            background-color: var(--unread-red);
            border-radius: 50%;
            display: inline-block;
        }

        .msg-preview {
            font-size: 13px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* --- PANNEAU DROIT : ZONE DES MESSAGES --- */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-main);
        }

        .chat-blank {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 15px;
        }

        .chat-header {
            padding: 14px 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 14px;
            background-color: rgba(30, 41, 59, 0.4);
        }

        /* Bouton retour caché par défaut sur PC */
        .back-btn {
            display: none;
            background: none;
            border: none;
            color: var(--accent-teal);
            cursor: pointer;
            padding: 4px 8px 4px 0px;
        }

        .back-btn svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        .header-meta {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .chat-header h3 {
            margin: 0;
            font-size: 16px;
            font-weight: 600;
        }

        .chat-header span {
            font-size: 12px;
            color: var(--text-muted);
        }

        .chat-messages {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 70%;
            display: flex;
            flex-direction: column;
        }

        .message.me { align-self: flex-end; }
        .message.them { align-self: flex-start; }

        .bubble {
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .message.me .bubble {
            background-color: var(--bubble-me);
            color: #0f172a;
            font-weight: 500;
            border-bottom-right-radius: 4px;
        }

        .message.them .bubble {
            background-color: var(--bubble-them);
            color: var(--text-main);
            border-bottom-left-radius: 4px;
        }

        .timestamp {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .message.me .timestamp { align-self: flex-end; }
        .message.them .timestamp { align-self: flex-start; }

        .chat-input-container {
            padding: 16px 24px;
            border-top: 1px solid var(--border-color);
            background-color: var(--bg-main);
        }

        .input-form {
            display: flex;
            gap: 12px;
        }

        .message-input {
            flex: 1;
            background-color: var(--bg-sidebar);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 12px 20px;
            color: var(--text-main);
            font-size: 14px;
            outline: none;
        }

        .message-input:focus { border-color: var(--accent-teal); }

        .send-btn {
            background-color: var(--accent-teal);
            border: none;
            border-radius: 50%;
            width: 42px;
            height: 42px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn svg { width: 18px; height: 18px; fill: #0f172a; }

        /* --- MEDIA QUERIES : ADAPTATION SMARTPHONES (Android & iPhone) --- */
        @media (max-width: 768px) {
            body {
                position: relative;
                width: 100vw;
            }

            .sidebar {
                width: 100vw;
                transition: transform 0.3s ease;
            }

            .chat-area {
                position: absolute;
                top: 0;
                left: 0;
                width: 100vw;
                height: 100vh;
                z-index: 10;
                transform: translateX(100vw); /* Caché sur la droite initialement */
                transition: transform 0.3s ease;
            }

            /* État quand une discussion est sélectionnée sur mobile */
            body.mobile-chat-view .sidebar {
                transform: translateX(-100vw); /* Pousse la liste vers la gauche */
            }

            body.mobile-chat-view .chat-area {
                transform: translateX(0); /* Fait glisser le chat à l'écran */
            }

            .back-btn {
                display: flex; /* Affiche le bouton retour uniquement sur mobile */
                align-items: center;
            }

            .chat-blank {
                display: none; /* Inutile sur mobile */
            }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <h1 class="sidebar-title">Discussions</h1>
            <input type="text" class="search-box" placeholder="Rechercher...">
        </div>
        <div class="discussion-list">
            {% for id, user in users.items() %}
            <div class="discussion-item" id="item-{{ user.id }}" onclick="loadDiscussion('{{ user.id }}')">
                <div class="avatar">{{ user.avatar }}</div>
                <div class="item-body">
                    <div class="item-name-row">
                        <span class="user-name">
                            {{ user.name }}
                            {% if user.unread %}
                            <span class="unread-dot" id="dot-{{ user.id }}"></span>
                            {% endif %}
                        </span>
                    </div>
                    <div class="msg-preview" id="preview-{{ user.id }}">{{ user.preview }}</div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    <div class="chat-area" id="chat-container">
        <div class="chat-blank">
            Sélectionnez une discussion pour commencer à discuter.
        </div>
    </div>

    <script>
        let activeUserId = null;

        function loadDiscussion(userId) {
            activeUserId = userId;

            // Gestion de l'état actif visuel (Desktop)
            document.querySelectorAll('.discussion-item').forEach(item => item.classList.remove('active'));
            document.getElementById(`item-${userId}`).classList.add('active');

            // Suppression visuelle du point rouge de notification non lue
            const dot = document.getElementById(`dot-${userId}`);
            if (dot) dot.style.display = 'none';

            // Activation de la vue Message sur Mobile/Tablette
            document.body.classList.add('mobile-chat-view');

            fetch(`/get_discussion/${userId}`)
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        renderChatWindow(data.user, data.messages);
                    }
                });
        }

        // Fonction pour quitter le chat et revenir à la liste sur smartphone
        function closeChatMobile() {
            document.body.classList.remove('mobile-chat-view');
        }

        function renderChatWindow(user, messages) {
            const container = document.getElementById('chat-container');
            
            let messagesHTML = '';
            messages.forEach(msg => {
                messagesHTML += `
                    <div class="message ${msg.sender}">
                        <div class="bubble">${msg.text}</div>
                        <span class="timestamp">${msg.time}</span>
                    </div>
                `;
            });

            container.innerHTML = `
                <div class="chat-header">
                    <button class="back-btn" onclick="closeChatMobile()">
                        <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
                    </button>
                    <div class="header-meta">
                        <h3>${user.name}</h3>
                        <span>${user.status}</span>
                    </div>
                </div>
                <div class="chat-messages" id="box-messages">
                    ${messagesHTML}
                </div>
                <div class="chat-input-container">
                    <form class="input-form" onsubmit="sendNewMessage(event)">
                        <input type="text" class="message-input" id="input-text" placeholder="Aa" autocomplete="off" required>
                        <button type="submit" class="send-btn">
                            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                        </button>
                    </form>
                </div>
            `;
            
            scrollToBottom();
        }

        function sendNewMessage(event) {
            event.preventDefault();
            const input = document.getElementById('input-text');
            const messageText = input.value.trim();
            if (!messageText || !activeUserId) return;

            fetch('/send_message', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id: activeUserId, text: messageText })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    const box = document.getElementById('box-messages');
                    const msgDiv = document.createElement('div');
                    msgDiv.className = 'message me';
                    msgDiv.innerHTML = `
                        <div class="bubble">${data.message.text}</div>
                        <span class="timestamp">${data.message.time}</span>
                    `;
                    box.appendChild(msgDiv);
                    
                    document.getElementById(`preview-${activeUserId}`).innerText = data.message.text;
                    input.value = '';
                    scrollToBottom();
                }
            });
        }

        function scrollToBottom() {
            const box = document.getElementById('box-messages');
            if (box) box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
